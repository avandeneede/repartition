<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breakdown">
<title>Répartition</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    color-scheme: light dark;
    --bg: #f2f2f7; --bg-elevated: #ffffff; --card: #ffffff;
    --text: #000000; --text-2: rgba(60,60,67,0.85); --muted: #8e8e93;
    --separator: rgba(60,60,67,0.16);
    --accent: #007aff; --success: #34c759; --warning: #ff9500; --danger: #ff3b30;
    --fill: rgba(118,118,128,0.12); --fill-2: rgba(118,118,128,0.08); --fill-3: rgba(118,118,128,0.20);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000; --bg-elevated: #1c1c1e; --card: #1c1c1e;
      --text: #ffffff; --text-2: rgba(235,235,245,0.85); --muted: #8e8e93;
      --separator: rgba(84,84,88,0.60);
      --accent: #0a84ff; --success: #30d158; --warning: #ff9f0a; --danger: #ff453a;
      --fill: rgba(118,118,128,0.24); --fill-2: rgba(118,118,128,0.18); --fill-3: rgba(118,118,128,0.36);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 17px/1.35 -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro", "Segoe UI", Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    min-height: 100vh; overscroll-behavior-y: contain;
  }
  body.sheet-open { overflow: hidden; position: fixed; width: 100%; }
  .sheet { touch-action: pan-y; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 8px 16px 48px; }

  .nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 4px 16px; }
  .nav .title { font-size: 34px; font-weight: 700; letter-spacing: -0.035em; }
  .nav .profile {
    background: none; border: none; color: var(--accent);
    font-size: 17px; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 4px; padding: 6px 8px;
  }
  .nav .profile:active { opacity: 0.6; }

  .hero { background: var(--card); border-radius: 16px; padding: 20px 20px 16px; margin-bottom: 28px; }
  .hero-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: 6px; }
  .hero-amount { display: flex; align-items: baseline; gap: 6px; font-size: 40px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; }
  .hero-amount .cur {
    color: var(--accent); font-weight: 500; cursor: pointer;
    min-width: 0.6em; text-align: center; user-select: none;
    padding: 0 4px; border-radius: 6px;
  }
  .hero-amount .cur:active { background: var(--fill); }
  .hero-amount input { all: unset; flex: 1; min-width: 0; font: inherit; color: inherit; font-variant-numeric: tabular-nums; }
  .hero-amount input::placeholder { color: var(--muted); opacity: 0.6; }

  .progress { height: 6px; background: var(--fill); border-radius: 3px; overflow: hidden; margin-top: 18px; }
  .progress > div { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s cubic-bezier(.4,0,.2,1), background .2s; }

  .stats { display: flex; gap: 14px; margin-top: 16px; padding-top: 14px; border-top: 0.5px solid var(--separator); }
  .stat { flex: 1; min-width: 0; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .stat-value { font-size: 17px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .stat.danger .stat-value { color: var(--danger); }
  .stat.success .stat-value { color: var(--success); }

  .section-head {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500;
    padding: 4px 16px 8px;
  }
  .section-head button { background: none; border: none; color: var(--accent); font-size: 22px; line-height: 1; padding: 4px 8px; cursor: pointer; border-radius: 50%; font-family: inherit; }
  .section-head button:active { background: var(--fill); }

  .group { background: var(--card); border-radius: 14px; overflow: hidden; margin-bottom: 28px; }

  .row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; position: relative; cursor: pointer; background: var(--card); transition: background .15s; }
  .row::after { content: ''; position: absolute; left: 16px; right: 0; bottom: 0; border-bottom: 0.5px solid var(--separator); }
  .row:last-child::after { display: none; }
  .row:active { background: var(--fill-2); }

  .row-rank { width: 22px; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .icon-tile { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; flex-shrink: 0; background: var(--tile-bg, #8e8e93); color: white; }
  .icon-tile svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

  .row-main { flex: 1; min-width: 0; }
  .row-title { font-size: 16px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-sub { font-size: 13px; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .row-right { text-align: right; flex-shrink: 0; min-width: 0; }
  .row-amount { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .row-amount.short { color: var(--warning); }
  .row-amount.zero { color: var(--muted); }
  .row-meta { font-size: 12px; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .row-meta.short { color: var(--warning); }
  .chevron { color: var(--muted); opacity: 0.45; font-size: 18px; line-height: 1; margin-left: 4px; }

  .row-action-icon { width: 26px; height: 26px; border-radius: 7px; background: var(--fill); color: var(--text-2); display: grid; place-items: center; flex-shrink: 0; }
  .row-action-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

  .group-empty { padding: 28px 20px; text-align: center; color: var(--muted); font-size: 15px; }

  .input {
    width: 100%; background: var(--fill); border: none;
    border-radius: 10px; padding: 12px 14px;
    color: var(--text); font-size: 17px; outline: none;
    font-family: inherit; font-variant-numeric: tabular-nums; transition: background .15s;
  }
  .input:focus { background: var(--fill-2); }
  .input::placeholder { color: var(--muted); opacity: 0.7; }

  .btn {
    font-family: inherit; font-size: 17px; font-weight: 500; cursor: pointer;
    background: var(--fill); color: var(--text);
    border: none; border-radius: 12px; padding: 12px 18px;
    transition: background .15s, transform .05s; text-align: center;
  }
  .btn:active { transform: scale(0.98); }
  .btn:hover { background: var(--fill-2); }
  .btn.primary { background: var(--accent); color: white; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger { color: var(--danger); }
  .btn.danger.primary { background: var(--danger); color: white; }
  .btn.ghost { background: transparent; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }

  .segmented { display: inline-flex; background: var(--fill); border-radius: 9px; padding: 2px; gap: 2px; }
  .segmented button {
    background: transparent; border: none; cursor: pointer;
    padding: 7px 14px; font: inherit; font-size: 14px; font-weight: 500;
    border-radius: 7px; color: var(--text-2); min-width: 52px; font-family: inherit;
  }
  .segmented button.active { background: var(--bg-elevated); color: var(--text); box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04); font-weight: 600; }
  @media (prefers-color-scheme: dark) { .segmented button.active { background: #48484a; box-shadow: 0 2px 6px rgba(0,0,0,0.3); } }

  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 100;
    pointer-events: none; transition: background .25s;
    -webkit-backdrop-filter: blur(0); backdrop-filter: blur(0);
  }
  .sheet-backdrop.open {
    background: rgba(0,0,0,0.45); pointer-events: auto;
    -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
  }
  #dialogSheet { z-index: 200; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--bg); border-radius: 16px 16px 0 0;
    padding: 6px 20px calc(env(safe-area-inset-bottom) + 40px);
    max-width: 560px; margin: 0 auto;
    max-height: calc(100vh - 44px - env(safe-area-inset-top));
    max-height: calc(100dvh - 44px - env(safe-area-inset-top));
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,.28,1);
    box-shadow: 0 -1px 0 rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    .sheet { box-shadow: 0 -1px 0 rgba(255,255,255,0.06); }
  }
  .sheet-backdrop.open .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 40px; height: 5px; background: var(--muted); opacity: 0.55;
    border-radius: 3px; margin: 8px auto 14px;
  }
  .sheet h2 { font-size: 20px; font-weight: 600; margin: 0 0 18px; letter-spacing: -0.02em; }
  .sheet h3 { font-size: 15px; font-weight: 600; margin: 22px 0 6px; letter-spacing: -0.01em; }
  .sheet p { margin: 0 0 10px; color: var(--text-2); font-size: 15px; line-height: 1.45; }
  .sheet ol, .sheet ul { padding-left: 22px; color: var(--text-2); font-size: 15px; line-height: 1.5; }
  .sheet li { margin-bottom: 6px; }
  .sheet code { font-family: "SF Mono", Menlo, monospace; font-size: 13px; background: var(--fill); padding: 1px 6px; border-radius: 5px; }
  .callout { background: var(--fill); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: var(--text-2); margin: 12px 0; }
  .field-label { font-size: 13px; color: var(--muted); font-weight: 500; margin: 18px 0 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field-label:first-child { margin-top: 0; }

  .icon-picker-btn {
    width: 48px; height: 48px; border-radius: 11px; border: none;
    display: grid; place-items: center; flex-shrink: 0; cursor: pointer;
    background: var(--tile-bg, #007aff); color: white; transition: transform .1s;
  }
  .icon-picker-btn:active { transform: scale(0.94); }
  .icon-picker-btn svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

  .icon-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-top: 12px; padding: 8px; background: var(--fill); border-radius: 12px; max-height: 320px; overflow-y: auto; }
  .icon-grid button {
    background: transparent; border: none; padding: 9px 0;
    border-radius: 9px; cursor: pointer; display: grid; place-items: center;
    color: var(--text-2); transition: background .15s, transform .1s; font-family: inherit;
  }
  .icon-grid button:hover { background: var(--fill-3); }
  .icon-grid button:active { transform: scale(0.9); }
  .icon-grid button.active { background: var(--fill-3); color: var(--text); }
  .icon-grid svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

  .color-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; margin-top: 12px; }
  .color-dot { aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: none; position: relative; padding: 0; background: var(--color); transition: transform .1s; }
  .color-dot:active { transform: scale(0.9); }
  .color-dot.active::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 2px solid var(--text); pointer-events: none; }

  .reorder { display: flex; gap: 8px; margin-top: 12px; }
  .reorder .btn { flex: 1; font-size: 15px; padding: 10px; }

  .muted { color: var(--muted); font-size: 13px; }
  .hide { display: none !important; }
  .check { color: var(--accent); font-size: 18px; font-weight: 600; width: 18px; text-align: center; }
  .checkbox {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1.5px solid var(--separator);
    display: grid; place-items: center; flex-shrink: 0;
    color: transparent; font-size: 14px; font-weight: 700;
    transition: background .15s, border-color .15s, color .15s;
  }
  .checkbox.checked { background: var(--accent); border-color: var(--accent); color: white; }
  .checkbox::before { content: '✓'; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 9px;
    background: transparent; border: none; cursor: pointer; padding: 0;
    display: grid; place-items: center; color: var(--text);
    font-family: inherit; transition: background .15s, transform .05s; flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.94); background: var(--fill); }
  .icon-btn.danger { color: var(--danger); }
  .icon-btn.danger:hover { background: rgba(255,59,48,0.12); }
  .icon-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

  .drag-handle {
    width: 32px; height: 32px; flex-shrink: 0;
    display: grid; place-items: center;
    background: transparent; border: none; padding: 0;
    color: var(--muted); cursor: grab;
    touch-action: none; font-family: inherit;
    transition: color .15s, background .15s;
    border-radius: 7px;
  }
  .drag-handle:hover { color: var(--text-2); background: var(--fill); }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle svg { width: 16px; height: 20px; fill: currentColor; pointer-events: none; }

  .row.dragging {
    z-index: 10;
    background: var(--card) !important;
    box-shadow: 0 12px 32px rgba(0,0,0,0.22), 0 0 0 0.5px var(--separator);
    cursor: grabbing;
    will-change: transform;
  }
  .row.dragging::after { display: none; }
  .footer { text-align: center; color: var(--muted); font-size: 12px; padding: 16px 0; }
</style>
</head>
<body>

<div class="wrap">
  <div class="nav">
    <div class="title" id="appTitle">Répartition</div>
    <button class="profile" id="profileBtn">
      <span id="profileName">—</span>
      <svg width="11" height="11" viewBox="0 0 12 12" aria-hidden="true"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="hero">
    <div class="hero-label" id="amountLabel">—</div>
    <div class="hero-amount">
      <span class="cur" id="curSym">€</span>
      <input id="budget" type="text" inputmode="decimal" autocomplete="off" placeholder="0">
    </div>
    <div class="progress"><div id="progressBar" style="width:0%"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-label" id="allocatedLabel">—</div><div class="stat-value" id="allocatedVal">—</div></div>
      <div class="stat" id="remainingStat"><div class="stat-label" id="freeLabel">—</div><div class="stat-value" id="remainingVal">—</div></div>
      <div class="stat hide" id="shortStat"><div class="stat-label" id="shortLabel">—</div><div class="stat-value" id="shortVal">—</div></div>
    </div>
  </div>

  <div class="section-head"><span id="keysSection">—</span><button id="addKeyBtn" title="+">＋</button></div>
  <div class="group" id="keysList"></div>

  <div class="section-head"><span id="dataSection">—</span></div>
  <div class="group">
    <div class="row" id="guideRow"><div class="row-main"><div class="row-title" id="guideRowTitle">—</div><div class="row-sub" id="guideRowSub">—</div></div><span class="chevron">›</span></div>
    <div class="row" id="exportRow"><div class="row-main"><div class="row-title" id="exportRowTitle">—</div><div class="row-sub" id="exportRowSub">—</div></div><span class="chevron">›</span></div>
    <div class="row" id="importRow"><div class="row-main"><div class="row-title" id="importRowTitle">—</div><div class="row-sub" id="importRowSub">—</div></div><span class="chevron">›</span></div>
    <div class="row" id="currencyRow"><div class="row-main"><div class="row-title" id="currencyRowTitle">—</div><div class="row-sub" id="currencyRowSub">—</div></div><span class="chevron">›</span></div>
    <div class="row" id="langRow"><div class="row-main"><div class="row-title" id="langRowTitle">—</div><div class="row-sub" id="langRowSub">—</div></div><span class="chevron">›</span></div>
    <div class="row" id="demoRow"><div class="row-main"><div class="row-title" id="demoRowTitle">—</div><div class="row-sub" id="demoRowSub">—</div></div><span class="chevron">›</span></div>
    <div class="row" id="resetRow"><div class="row-main"><div class="row-title" id="resetRowTitle" style="color:var(--danger)">—</div><div class="row-sub" id="resetRowSub">—</div></div><span class="chevron">›</span></div>
  </div>
  <input id="importFile" type="file" accept="application/json" class="hide">

  <div class="footer" id="footerText">—</div>
</div>

<div class="sheet-backdrop" id="profileSheet"><div class="sheet">
  <div class="sheet-handle"></div>
  <h2 id="profileSheetTitle">—</h2>
  <div class="group" id="profileList"></div>
  <button class="btn primary" type="button" id="newProfileBtn" style="width:100%">—</button>
</div></div>

<div class="sheet-backdrop" id="keySheet"><div class="sheet">
  <div class="sheet-handle"></div>
  <h2 id="keySheetTitle">—</h2>
  <div style="display:flex;gap:12px;align-items:center">
    <button class="icon-picker-btn" id="keyIconBtn" type="button"></button>
    <input type="text" class="input" id="keyName" placeholder="—" autocomplete="off">
  </div>
  <div class="color-row" id="colorRow"></div>
  <div class="icon-grid hide" id="iconGrid"></div>
  <div class="field-label" id="typeValueLabel">—</div>
  <div style="display:flex;gap:10px;align-items:center">
    <input type="number" inputmode="decimal" step="0.01" class="input" id="keyValue" placeholder="0" style="flex:1">
    <div class="segmented">
      <button type="button" id="typeAbs" class="active" data-type="amount">€</button>
      <button type="button" id="typePct" data-type="percent">%</button>
    </div>
  </div>
  <div id="percentModeWrap" class="hide" style="margin-top:10px">
    <div class="segmented" style="display:flex;width:100%">
      <button type="button" id="pctTotal" class="active" style="flex:1" data-pct="total">—</button>
      <button type="button" id="pctRest" style="flex:1" data-pct="rest">—</button>
    </div>
  </div>
  <div class="muted" id="valueHint" style="margin-top:6px"></div>
  <div id="reorderSection" class="hide">
    <div class="field-label" id="priorityLabel">—</div>
    <div class="reorder">
      <button class="btn" type="button" id="moveUp">—</button>
      <button class="btn" type="button" id="moveDown">—</button>
    </div>
    <div class="muted" id="priorityHint" style="margin-top:8px">—</div>
  </div>
  <div class="btn-row" style="margin-top:24px">
    <button class="btn danger" type="button" id="keyDelete">—</button>
    <button class="btn primary" type="button" id="keySave" style="flex:2">—</button>
  </div>
</div></div>

<div class="sheet-backdrop" id="guideSheet"><div class="sheet">
  <div class="sheet-handle"></div>
  <h2 id="guideSheetTitle">—</h2>
  <div id="guideContent"></div>
  <button class="btn primary" type="button" id="guideClose" style="width:100%;margin-top:20px">—</button>
</div></div>

<div class="sheet-backdrop" id="langSheet"><div class="sheet">
  <div class="sheet-handle"></div>
  <h2 id="langSheetTitle">—</h2>
  <div class="group" id="langList"></div>
</div></div>

<div class="sheet-backdrop" id="currencySheet"><div class="sheet">
  <div class="sheet-handle"></div>
  <h2 id="currencySheetTitle">—</h2>
  <div class="group" id="currencyList"></div>
</div></div>

<div class="sheet-backdrop" id="exportSheet"><div class="sheet">
  <div class="sheet-handle"></div>
  <h2 id="exportSheetTitle">—</h2>
  <p class="muted" id="exportSheetSub">—</p>
  <div class="group" id="exportList"></div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn" type="button" id="exportSelectAll">—</button>
    <button class="btn primary" type="button" id="exportConfirm" style="flex:2">—</button>
  </div>
</div></div>

<div class="sheet-backdrop" id="importSheet"><div class="sheet">
  <div class="sheet-handle"></div>
  <h2 id="importSheetTitle">—</h2>
  <p class="muted" id="importSheetSub">—</p>
  <div class="group" id="importList"></div>
  <div class="field-label" id="importModeLabel">—</div>
  <div class="segmented" style="display:flex;width:100%">
    <button type="button" id="importModeReplace" class="active" style="flex:1" data-mode="replace">—</button>
    <button type="button" id="importModeAdd" style="flex:1" data-mode="add">—</button>
  </div>
  <div class="muted" id="importModeHint" style="margin-top:8px">—</div>

  function migrate(raw) {
    if (!raw) return null;
    let s;
    try { s = typeof raw === 'string' ? JSON.parse(raw) : raw; } catch { return null; }
    if (!s || !s.profiles) return null;
    if (s.v === 6) return s;

    Object.values(s.profiles).forEach(p => {

          value: +e.alloc || 0,
        }));
      }
      if (p.budget !== undefined && p.amount === undefined) { p.amount = p.budget; delete p.budget; }
      if (p.mode && source && source.length && !('type' in (source[0] || {}))) {
        const t = p.mode === 'pct' ? 'percent-total' : 'amount';
        source = source.map(k => ({ ...k, type: t, value: +k.value || 0 }));
      }
      delete p.mode; delete p.envelopes;
      p.currency = normalizeCurrency(p.currency);
      p.keys = (source || []).map(k => {

          type: normalizeType(k.type),
          value: +k.value || 0,

        if (k.i18nKey) out.i18nKey = k.i18nKey;
        return out;

    if (!s.profiles[s.currentId]) s.currentId = Object.keys(s.profiles)[0] || 'p_default';

    s.v = 6;
    return s;

  function t(key, vars) {
    const parts = key.split('.');

    if (v == null) {
      let fb = T.fr;

  // ============ Compute ============
  function compute(p) {
    const total = +p.amount || 0;
    let pool = total;
    const results = p.keys.map(k => {
      let requested;
      if (k.type === 'percent-total')      requested = total * (+k.value || 0) / 100;
      else if (k.type === 'percent-rest')  requested = pool * (+k.value || 0) / 100;
      else                                 requested = (+k.value || 0);
      const actual = Math.max(0, Math.min(requested, pool));
      pool -= actual;
      return { key: k, requested, actual, short: requested - actual };
    });
    const allocated = total - pool;
    const totalRequested = results.reduce((s, r) => s + r.requested, 0);
    const totalShort = Math.max(0, totalRequested - total);
    return { total, allocated, pool, results, totalShort };
  }
  function poolAtPosition(p, pos) {
    const total = +p.amount || 0;
    let pool = total;
    for (let i = 0; i < Math.min(pos, p.keys.length); i++) {
      const k = p.keys[i];
      let r;
      if (k.type === 'percent-total')      r = total * (+k.value || 0) / 100;
      else if (k.type === 'percent-rest')  r = pool * (+k.value || 0) / 100;
      else                                 r = (+k.value || 0);
      pool -= Math.max(0, Math.min(r, pool));
    }
    return Math.max(0, pool);
  }

    backdrop.addEventListener('click', e => {
      if (e.target === backdrop) closeSheet(backdrop.id);
    });
    // Pull-down-to-dismiss on the sheet itself
    const sheet = backdrop.querySelector('.sheet');
    if (!sheet) return;
    let startY = 0, lastY = 0, dragging = false, startScrollTop = 0;
    sheet.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      startY = lastY = e.touches[0].clientY;
      startScrollTop = sheet.scrollTop;
      dragging = startScrollTop <= 0;
      sheet.style.transition = 'none';
    }, { passive: true });
    sheet.addEventListener('touchmove', e => {
      if (!dragging) return;
      lastY = e.touches[0].clientY;
      const delta = lastY - startY;
      if (delta > 0) {
        sheet.style.transform = `translateY(${delta}px)`;
        e.preventDefault();
      } else {
        dragging = false;
        sheet.style.transform = '';
      }
    }, { passive: false });
    const endDrag = () => {
      if (!dragging) return;
      dragging = false;
      sheet.style.transition = '';
      const delta = lastY - startY;
      sheet.style.transform = '';
      if (delta > 120) closeSheet(backdrop.id);
    };
    sheet.addEventListener('touchend', endDrag);
    sheet.addEventListener('touchcancel', endDrag);
  });

  // Pointer-based drag & drop for reordering keys
  function setupRowDrag(rowEl, startIndex) {
    const handle = rowEl.querySelector('.drag-handle');
    if (!handle) return;
    handle.addEventListener('pointerdown', (e) => {
      if (e.button !== undefined && e.button !== 0 && e.pointerType === 'mouse') return;
      e.preventDefault();
      handle.setPointerCapture(e.pointerId);

      const list = $('#keysList');
      const allRows = [...list.children];
      const sIdx = allRows.indexOf(rowEl);
      if (sIdx < 0) return;

      const rowHeight = rowEl.offsetHeight;
      const origTops = allRows.map(r => r.getBoundingClientRect().top);

      const state = { startY: e.clientY, startIndex: sIdx, currentIndex: sIdx };
      rowEl.classList.add('dragging');

      const move = (ev) => {
        const delta = ev.clientY - state.startY;
        rowEl.style.transform = `translateY(${delta}px)`;

        let target = state.startIndex;
        allRows.forEach((row, i) => {
          if (i === state.startIndex) return;
          const mid = origTops[i] + row.offsetHeight / 2;
          if (i < state.startIndex && ev.clientY < mid) target = Math.min(target, i);
          else if (i > state.startIndex && ev.clientY > mid) target = Math.max(target, i);
        });

        if (target !== state.currentIndex) {
          state.currentIndex = target;
          allRows.forEach((row, i) => {
            if (i === state.startIndex) return;
            let shift = 0;
            if (state.startIndex < target && i > state.startIndex && i <= target) shift = -rowHeight;
            else if (state.startIndex > target && i < state.startIndex && i >= target) shift = rowHeight;
            row.style.transform = shift ? `translateY(${shift}px)` : '';
            row.style.transition = 'transform .18s cubic-bezier(.4,0,.2,1)';
          });
        }
      };

      const end = () => {
        handle.removeEventListener('pointermove', move);
        handle.removeEventListener('pointerup', end);
        handle.removeEventListener('pointercancel', end);
        allRows.forEach(row => { row.style.transform = ''; row.style.transition = ''; });
        rowEl.classList.remove('dragging');
        if (state.currentIndex !== state.startIndex) {
          const p = current();
          const [moved] = p.keys.splice(state.startIndex, 1);
          p.keys.splice(state.currentIndex, 0, moved);
          save(); renderAll();
        }
      };

      handle.addEventListener('pointermove', move);
      handle.addEventListener('pointerup', end);
      handle.addEventListener('pointercancel', end);
    });
  }

  const renderAll = () => { renderHero(); renderKeys(); };

  // Data row icons (once)
  $('#guideRow').prepend(Object.assign(document.createElement('div'), { className: 'row-action-icon', innerHTML: ACTION_SVG.guide }));
  $('#exportRow').prepend(Object.assign(document.createElement('div'), { className: 'row-action-icon', innerHTML: ACTION_SVG.down }));
  $('#importRow').prepend(Object.assign(document.createElement('div'), { className: 'row-action-icon', innerHTML: ACTION_SVG.up }));
  $('#currencyRow').prepend(Object.assign(document.createElement('div'), { className: 'row-action-icon', innerHTML: ACTION_SVG.coin }));
  $('#langRow').prepend(Object.assign(document.createElement('div'), { className: 'row-action-icon', innerHTML: ACTION_SVG.globe }));
  $('#demoRow').prepend(Object.assign(document.createElement('div'), { className: 'row-action-icon', innerHTML: ACTION_SVG.sparkle }));
  $('#resetRow').prepend(Object.assign(document.createElement('div'), { className: 'row-action-icon', innerHTML: ACTION_SVG.refresh }));

  // ============ Key sheet ============
  let editingId = null;
  let draftIcon = 'wallet';
  let draftColor = 'blue';

  const iconGrid = $('#iconGrid');
  ICON_KEYS.forEach(name => {
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.icon = name;
    b.title = name;
    b.innerHTML = svgIcon(name);
    b.addEventListener('click', () => { draftIcon = name; updateIconBtn(); updateIconGridActive(); });
    iconGrid.appendChild(b);
  });

  const colorRow = $('#colorRow');
  COLORS.forEach(({ k, c }) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'color-dot';
    b.dataset.color = k;
    b.style.setProperty('--color', c);
    b.setAttribute('aria-label', k);
    b.addEventListener('click', () => { draftColor = k; updateIconBtn(); updateColorActive(); });
    colorRow.appendChild(b);
  });

  const updateIconBtn = () => {
    const btn = $('#keyIconBtn');
    btn.style.setProperty('--tile-bg', colorHex(draftColor));
    btn.innerHTML = svgIcon(draftIcon);
  };
  const updateColorActive = () => $$('#colorRow .color-dot').forEach(b => b.classList.toggle('active', b.dataset.color === draftColor));
  const updateIconGridActive = () => $$('#iconGrid button').forEach(b => b.classList.toggle('active', b.dataset.icon === draftIcon));

  $('#keyIconBtn').addEventListener('click', () => iconGrid.classList.toggle('hide'));

  function setType(type) {
    const isPct = type === 'percent-total' || type === 'percent-rest';
    $('#typeAbs').classList.toggle('active', !isPct);
    $('#typePct').classList.toggle('active', isPct);
    $('#percentModeWrap').classList.toggle('hide', !isPct);
    $('#pctTotal').classList.toggle('active', type !== 'percent-rest');
    $('#pctRest').classList.toggle('active', type === 'percent-rest');
    updateValueHint();
  }
  const getType = () => {
    if ($('#typeAbs').classList.contains('active')) return 'amount';
    return $('#pctRest').classList.contains('active') ? 'percent-rest' : 'percent-total';
  };

  function updateValueHint() {
    const p = current();
    const sym = curSymOf(p.currency);
    const type = getType();
    const v = +$('#keyValue').value || 0;
    const hint = $('#valueHint');
    if (type === 'percent-total') {
      hint.textContent = p.amount > 0
        ? t('hintPctTotal', { amount: fmt(p.amount * v / 100), currency: sym, total: fmt(p.amount) })
        : t('hintSetAmount');
    } else if (type === 'percent-rest') {
      const pos = editingId ? p.keys.findIndex(x => x.id === editingId) : p.keys.length;
      const basePool = poolAtPosition(p, pos < 0 ? p.keys.length : pos);
      hint.textContent = p.amount > 0
        ? t('hintPctRest', { amount: fmt(basePool * v / 100), currency: sym })
        : t('hintSetAmount');
    } else {
      hint.textContent = p.amount > 0 ? t('hintAmt', { pct: fmt(v / p.amount * 100) }) : '';
    }
  }

  $('#typeAbs').addEventListener('click', () => setType('amount'));
  $('#typePct').addEventListener('click', () => setType('percent-total'));
  $('#pctTotal').addEventListener('click', () => setType('percent-total'));
  $('#pctRest').addEventListener('click', () => setType('percent-rest'));
  $('#keyValue').addEventListener('input', updateValueHint);

  function openKeySheet(id) {
    const p = current();
    let k = id ? p.keys.find(x => x.id === id) : null;
    const isNew = !k;
    editingId = isNew ? null : k.id;
    if (isNew) k = { icon: 'wallet', color: 'blue', name: '', type: 'amount', value: 0 };

    $('#keySheetTitle').textContent = isNew ? t('newKey') : t('editKey');
    draftIcon = ICONS[k.icon] ? k.icon : 'wallet';
    draftColor = COLOR_MAP[k.color] ? k.color : 'blue';
    updateIconBtn(); updateColorActive(); updateIconGridActive();
    iconGrid.classList.add('hide');
    $('#keyName').value = isNew ? k.name : displayName(k);
    $('#keyValue').value = k.value || '';
    $('#typeAbs').textContent = curSymOf(p.currency);
    setType(k.type);
    $('#keyDelete').classList.toggle('hide', isNew);
    $('#reorderSection').classList.toggle('hide', isNew);
    updateValueHint();
    openSheet('keySheet');
  }

  $('#addKeyBtn').addEventListener('click', () => openKeySheet(null));

  $('#keySave').addEventListener('click', () => {
    const p = current();
    const existing = editingId ? p.keys.find(x => x.id === editingId) : null;
    const typed = ($('#keyName').value || '').trim();
    const draft = {
      id: editingId || uid(),
      icon: draftIcon, color: draftColor,
      name: typed || t('key'),
      type: getType(),
      value: +$('#keyValue').value || 0,
    };
    // Preserve i18nKey if the user didn't rename a default key
    if (existing && existing.i18nKey && typed === displayName(existing)) {
      draft.i18nKey = existing.i18nKey;
      draft.name = existing.name; // keep original stored name so translation logic keeps working
    }
    if (editingId) {
      const i = p.keys.findIndex(x => x.id === editingId);
      if (i >= 0) p.keys[i] = draft; else p.keys.push(draft);
    } else {
      p.keys.push(draft);
    }
    save(); renderAll(); closeSheet('keySheet');
  });

  $('#keyDelete').addEventListener('click', async () => {
    if (!editingId) return;
    const ok = await dialog({
      title: t('dlgDeleteKey'), message: t('dlgDeleteKeyMsg'),
      okText: t('dlgDelete'), okStyle: 'danger primary',
    });
    if (!ok) return;
    const p = current();
    p.keys = p.keys.filter(x => x.id !== editingId);
    save(); renderAll(); closeSheet('keySheet');
  });

  function moveKey(delta) {
    if (!editingId) return;
    const p = current();
    const i = p.keys.findIndex(x => x.id === editingId);
    const j = i + delta;
    if (i < 0 || j < 0 || j >= p.keys.length) return;
    [p.keys[i], p.keys[j]] = [p.keys[j], p.keys[i]];
    save(); renderAll();
  }
  $('#moveUp').addEventListener('click', () => moveKey(-1));
  $('#moveDown').addEventListener('click', () => moveKey(1));

  // ============ Budget input (thousands separator, arrow keys step 50) ============
  $('#budget').addEventListener('focus', e => {
    const v = current().amount;
    e.target.value = v > 0 ? String(v) : '';
    setTimeout(() => e.target.select(), 0);
  });
  $('#budget').addEventListener('blur', () => {
    const v = current().amount;
    $('#budget').value = v > 0 ? fmtAmount(v) : '';
  });
  $('#budget').addEventListener('input', e => {
    current().amount = parseAmountInput(e.target.value);
    save(); renderHero(); renderKeys();
  });
  $('#budget').addEventListener('keydown', e => {
    if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
    e.preventDefault();
    const p = current();
    const delta = e.key === 'ArrowUp' ? 50 : -50;
    const cur = +p.amount || 0;
    const next = Math.max(0, delta > 0
      ? Math.floor(cur / 50) * 50 + 50
      : Math.ceil(cur / 50) * 50 - 50);
    p.amount = next;
    save();
    e.target.value = String(next);
    renderHero(); renderKeys();
  });

  // ============ Profile sheet ============
  function renderProfileList() {
    const list = $('#profileList');
    list.innerHTML = '';
    Object.entries(state.profiles).forEach(([id, p]) => {
      const isActive = id === state.currentId;
      const canDelete = Object.keys(state.profiles).length > 1;
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="row-main">
          <div class="row-title">${esc(p.name)}</div>
          <div class="row-sub">${p.keys.length} · ${fmt(p.amount || 0)} ${esc(curSymOf(p.currency))}</div>
        </div>
        ${isActive ? '<span class="check">✓</span>' : ''}
        <button class="btn ghost" type="button" data-rename="${id}" style="padding:6px 10px;font-size:14px">${t('rename')}</button>
        ${canDelete ? `<button class="icon-btn danger" type="button" data-delete="${id}" aria-label="${esc(t('delete'))}" title="${esc(t('delete'))}">${TRASH_SVG}</button>` : ''}`;
      row.addEventListener('click', e => {
        if (e.target.closest('[data-rename], [data-delete]')) return;
        state.currentId = id; save(); renderAll(); applyStaticTexts(); closeSheet('profileSheet');
      });
      list.appendChild(row);
    });
    $$('#profileList [data-rename]').forEach(b => b.addEventListener('click', async e => {
      e.stopPropagation();
      const id = b.dataset.rename;
      const name = await dialog({
        title: t('dlgRename'), input: true,
        defaultValue: state.profiles[id].name,
        placeholder: t('dlgNewProfilePH'),
      });
      if (name) { state.profiles[id].name = name; save(); renderProfileList(); renderHero(); }
    }));
    $$('#profileList [data-delete]').forEach(b => b.addEventListener('click', async e => {
      e.stopPropagation();
      const id = b.dataset.delete;
      const ok = await dialog({
        title: t('dlgDeleteProfile', { name: state.profiles[id].name }),
        message: t('dlgDeleteProfileMsg'),
        okText: t('dlgDelete'), okStyle: 'danger primary',
      });
      if (!ok) return;
      delete state.profiles[id];
      if (state.currentId === id) state.currentId = Object.keys(state.profiles)[0];
      save(); renderProfileList(); renderAll(); applyStaticTexts();
    }));
  }

  $('#profileBtn').addEventListener('click', () => { renderProfileList(); openSheet('profileSheet'); });

  $('#newProfileBtn').addEventListener('click', async () => {
    const name = await dialog({
      title: t('dlgNewProfile'), input: true,
      placeholder: t('dlgNewProfilePH'),
      okText: t('dlgCreate'),
    });
    if (!name) return;
    const id = 'p_' + uid();
    state.profiles[id] = { name, currency: current().currency || 'EUR', amount: 0, keys: [] };
    state.currentId = id;
    save(); closeSheet('profileSheet'); renderAll(); applyStaticTexts();
  });

  // ============ Currency picker ============
  function renderCurrencyList() {
    const p = current();
    const list = $('#currencyList');
    const locale = tr().appLocale;
    list.innerHTML = '';
    CURRENCY_ORDER.forEach(code => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="row-main">
          <div class="row-title">${esc(currencyName(code, locale))}</div>
          <div class="row-sub">${esc(code)} · ${esc(curSymOf(code))}</div>
        </div>
        ${code === p.currency ? '<span class="check">✓</span>' : ''}`;
      row.addEventListener('click', () => {
        p.currency = code; save(); renderAll(); applyStaticTexts(); closeSheet('currencySheet');
      });
      list.appendChild(row);
    });
  }
  $('#currencyRow').addEventListener('click', () => { renderCurrencyList(); openSheet('currencySheet'); });
  $('#curSym').addEventListener('click', () => { renderCurrencyList(); openSheet('currencySheet'); });

  // ============ Language sheet ============
  function renderLangList() {
    const list = $('#langList');
    list.innerHTML = '';
    LANGS.forEach(lg => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="row-main"><div class="row-title">${LANG_NAMES[lg]}</div></div>
        ${lg === state.lang ? '<span class="check">✓</span>' : ''}`;
      row.addEventListener('click', () => {
        state.lang = lg; save();
        applyStaticTexts(); renderAll();
        renderLangList(); closeSheet('langSheet');
      });
      list.appendChild(row);
    });
  }
  $('#langRow').addEventListener('click', () => { renderLangList(); openSheet('langSheet'); });

  // ============ Export / Import (with selection) ============
  const exportSelection = new Set();
  const importSelection = new Set();
  let importedState = null;
  let importMode = 'replace';

  function renderProfilePicker(listEl, profiles, selection, onToggle) {
    listEl.innerHTML = '';
    Object.entries(profiles).forEach(([id, p]) => {
      const row = document.createElement('div');
      row.className = 'row';
      const selected = selection.has(id);
      row.innerHTML = `
        <div class="row-main">
          <div class="row-title">${esc(p.name)}</div>
          <div class="row-sub">${p.keys.length} · ${fmt(p.amount || 0)} ${esc(curSymOf(p.currency || 'EUR'))}</div>
        </div>
        <span class="checkbox ${selected ? 'checked' : ''}"></span>`;
      row.addEventListener('click', () => {
        if (selection.has(id)) selection.delete(id); else selection.add(id);
        onToggle();
      });
      listEl.appendChild(row);
    });
  }

  function updateExportUI() {
    renderProfilePicker($('#exportList'), state.profiles, exportSelection, updateExportUI);
    const total = Object.keys(state.profiles).length;
    const allSelected = exportSelection.size === total;
    $('#exportSelectAll').textContent = allSelected ? t('deselectAll') : t('selectAll');
    const btn = $('#exportConfirm');
    btn.textContent = t('exportBtn');
    btn.disabled = exportSelection.size === 0;
    btn.style.opacity = exportSelection.size === 0 ? '0.5' : '';
  }

  function updateImportUI() {
    if (!importedState) return;
    renderProfilePicker($('#importList'), importedState.profiles, importSelection, updateImportUI);
    const total = Object.keys(importedState.profiles).length;
    const allSelected = importSelection.size === total;
    $('#importSelectAll').textContent = allSelected ? t('deselectAll') : t('selectAll');
    $('#importModeReplace').classList.toggle('active', importMode === 'replace');
    $('#importModeAdd').classList.toggle('active', importMode === 'add');
    $('#importModeHint').textContent = importMode === 'replace' ? t('importModeReplaceHint') : t('importModeAddHint');
    const btn = $('#importConfirm');
    btn.textContent = t('importBtn');
    btn.disabled = importSelection.size === 0;
    btn.style.opacity = importSelection.size === 0 ? '0.5' : '';
  }

  $('#exportRow').addEventListener('click', () => {
    exportSelection.clear();
    Object.keys(state.profiles).forEach(id => exportSelection.add(id));
    $('#exportSheetTitle').textContent = t('exportSheetTitle');
    $('#exportSheetSub').textContent = t('exportSheetSub');
    updateExportUI();
    openSheet('exportSheet');
  });

  $('#exportSelectAll').addEventListener('click', () => {
    const total = Object.keys(state.profiles).length;
    if (exportSelection.size === total) exportSelection.clear();
    else Object.keys(state.profiles).forEach(id => exportSelection.add(id));
    updateExportUI();
  });

  $('#exportConfirm').addEventListener('click', () => {
    if (exportSelection.size === 0) return;
    const profiles = {};
    exportSelection.forEach(id => { if (state.profiles[id]) profiles[id] = state.profiles[id]; });
    const firstId = [...exportSelection][0];
    const payload = { v: 6, lang: state.lang, currentId: firstId, profiles };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `breakdown-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    closeSheet('exportSheet');
  });

  $('#importRow').addEventListener('click', () => $('#importFile').click());
  $('#importFile').addEventListener('change', async e => {
    const f = e.target.files[0]; e.target.value = '';
    if (!f) return;
    const r = new FileReader();
    r.onload = async () => {
      try {
        const s = migrate(r.result);
        if (!s || !s.profiles || !Object.keys(s.profiles).length) throw new Error('invalid');
        importedState = s;
        importSelection.clear();
        Object.keys(s.profiles).forEach(id => importSelection.add(id));
        importMode = 'replace';
        $('#importSheetTitle').textContent = t('importSheetTitle');
        $('#importSheetSub').textContent = t('importSheetSub');
        $('#importModeLabel').textContent = t('importModeLabel');
        $('#importModeReplace').textContent = t('importModeReplace');
        $('#importModeAdd').textContent = t('importModeAdd');
        updateImportUI();
        openSheet('importSheet');
      } catch (err) {
        await dialog({ title: t('dlgImportFailed'), message: err.message || '', showCancel: false });
      }
    };
    r.readAsText(f);
  });

  $('#importSelectAll').addEventListener('click', () => {
    if (!importedState) return;
    const total = Object.keys(importedState.profiles).length;
    if (importSelection.size === total) importSelection.clear();
    else Object.keys(importedState.profiles).forEach(id => importSelection.add(id));
    updateImportUI();
  });
  $('#importModeReplace').addEventListener('click', () => { importMode = 'replace'; updateImportUI(); });
  $('#importModeAdd').addEventListener('click',     () => { importMode = 'add';     updateImportUI(); });

  $('#importConfirm').addEventListener('click', () => {
    if (!importedState || importSelection.size === 0) return;
    if (importMode === 'replace') {
      const profiles = {};
      importSelection.forEach(id => { if (importedState.profiles[id]) profiles[id] = importedState.profiles[id]; });
      const firstId = [...importSelection][0];
      state = {
        v: 6,
        lang: importedState.lang && T[importedState.lang] ? importedState.lang : state.lang,
        currentId: firstId,
        profiles,
      };
    } else {
      importSelection.forEach(id => {
        const p = importedState.profiles[id];
        if (!p) return;
        const newId = 'p_' + uid();
        state.profiles[newId] = JSON.parse(JSON.stringify(p));
      });
    }
    importedState = null;
    save(); applyStaticTexts(); renderAll();
    closeSheet('importSheet');
  });

  $('#guideRow').addEventListener('click', () => openSheet('guideSheet'));
  $('#guideClose').addEventListener('click', () => closeSheet('guideSheet'));

  $('#demoRow').addEventListener('click', async () => {
    const ok = await dialog({
      title: t('dlgDemo'), message: t('dlgDemoMsg'),
      okText: t('dlgDemoBtn'), okStyle: 'primary',
    });
    if (!ok) return;
    state = demoState(state.lang);
    save(); applyStaticTexts(); renderAll();
  });

  $('#resetRow').addEventListener('click', async () => {
    const ok = await dialog({
      title: t('dlgReset'), message: t('dlgResetMsg'),
      okText: t('dlgResetBtn'), okStyle: 'danger primary',
    });
    if (!ok) return;
    state = emptyState(state.lang);
    save(); applyStaticTexts(); renderAll();
  });

  // ============ Boot ============
  applyStaticTexts();
  renderAll();
})();
</script>
</body>
</html>
